# Reusable deployment workflow — called by dockerhub.yaml.
# Secrets are read from the GitHub Environment named by the ENVIRONMENT input;
# no per-environment prefixes are needed (DEV_, PROD_, TESTNET_, etc.).
name: Deploy via ssh
on:
  workflow_call:
    inputs:
      VERSION:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"
        type: string
      ENVIRONMENT:
        description: "GitHub environment to deploy to (develop, testnet, staging, production)"
        required: true
        type: string
      CONTAINER_NAME:
        description: "Docker container name"
        required: true
        type: string
      AE_NETWORK_ID:
        description: "Aeternity network id (ae_uat or ae_mainnet)"
        required: false
        default: ae_mainnet
        type: string
      API_HOST_PORT:
        description: "Host port mapped to the container's port 3000"
        required: true
        type: string
jobs:
  deploy:
    name: Deploy via ssh
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate .env.api.${{ inputs.ENVIRONMENT }}
        env:
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          # All secrets and inputs are serialised as JSON so the script can look
          # up each .env.example key by name without an explicit per-secret list.
          # Secrets take precedence; inputs are the fallback (they carry static
          # overrides such as AE_NETWORK_ID, DB_DATABASE, NOTIFICATIONS_ENABLED…)
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_INPUTS: ${{ toJSON(inputs) }}
        run: |
          # Build .env.api.<environment> from .env.example.
          # For every KEY= line: if the key exists in ALL_SECRETS use that value
          # (even empty), else if it exists in ALL_INPUTS use that, else keep
          # the .env.example line as-is. Comment and blank lines are stripped.
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]]               && continue
            key="${line%%=*}"
            # jq -e exits 1 when the result is null (key absent from both objects),
            # so the if/else cleanly separates found vs not-found with no sentinel.
            if value=$(jq -rne \
              --argjson s "$ALL_SECRETS" \
              --argjson i "$ALL_INPUTS" \
              --arg k "$key" \
              'if ($s | has($k)) then $s[$k] elif ($i | has($k)) then $i[$k] else null end'); then
              # Collapse newlines — env file values must be single-line
              value=$(printf '%s' "$value" | tr '\n' ' ' | sed 's/[[:space:]]*$//')
              printf '%s=%s\n' "$key" "$value"
            else
              printf '%s\n' "$line"
            fi
          done < .env.example > ".env.api.$ENVIRONMENT"

      - name: Copy .env.api.${{ inputs.ENVIRONMENT }} to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: ".env.api.${{ inputs.ENVIRONMENT }}"
          target: "~/"

      - name: Deploy container
        uses: appleboy/ssh-action@v1.2.5
        env:
          VERSION: ${{ inputs.VERSION }}
          SHA: ${{ github.sha }}
          CONTAINER_NAME: ${{ inputs.CONTAINER_NAME }}
          API_HOST_PORT: ${{ inputs.API_HOST_PORT }}
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          HOST_DATA_DIR: "./${{ inputs.CONTAINER_NAME }}"
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: VERSION,SHA,CONTAINER_NAME,API_HOST_PORT,ENVIRONMENT,HOST_DATA_DIR
          script: |
            mkdir -p "$HOST_DATA_DIR"
            echo "$SHA" > "$HOST_DATA_DIR/REVISION"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull "${{ secrets.DOCKERHUB_REPO }}:$VERSION"
            docker stop "$CONTAINER_NAME" || true
            docker rm   "$CONTAINER_NAME" || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart=always \
              --log-driver json-file \
              --log-opt max-size=100m \
              --log-opt max-file=30 \
              -p "$API_HOST_PORT:3000" \
              --env-file ~/.env.api."$ENVIRONMENT" \
              -e NODE_ENV=production \
              -e DB_HOST="${CONTAINER_NAME}-db" \
              -e REDIS_HOST="${CONTAINER_NAME}-redis" \
              --network "${CONTAINER_NAME}-db" \
              "${{ secrets.DOCKERHUB_REPO }}:$VERSION"
