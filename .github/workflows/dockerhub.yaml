name: Dockerhub
on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "Docker image tag to deploy (leave empty to use branch default; useful for rollbacks)"
        required: false
        type: string
  push:
    tags: [v*]
    branches: [main, develop]
concurrency: ${{ github.workflow }}-${{ github.ref_name }}
jobs:
  buildx:
    name: Docker Buildx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for docker-package to be able to calculate the version
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
          flavor: |
            latest=${{ contains(github.ref_name, '-rc.') && 'false' || 'auto' }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            "GITHUB_TOKEN=${{ secrets.NPM_GITHUB_TOKEN }}"

  deploy_develop:
    if: github.ref_name == 'develop'
    name: Deploy (develop)
    needs: buildx
    uses: ./.github/workflows/ssh_deploy.yaml
    with:
      VERSION: ${{ inputs.VERSION || 'develop' }}
      ENVIRONMENT: develop
      CONTAINER_NAME: develop-superhero-api-mainnet
      AE_NETWORK_ID: ae_mainnet
      API_HOST_PORT: "3043"
    secrets: inherit

  deploy_testnet:
    if: github.ref_name == 'develop'
    name: Deploy (testnet)
    needs: buildx
    uses: ./.github/workflows/ssh_deploy.yaml
    with:
      VERSION: ${{ inputs.VERSION || 'develop' }}
      ENVIRONMENT: testnet
      CONTAINER_NAME: develop-superhero-api-testnet
      AE_NETWORK_ID: ae_uat
      API_HOST_PORT: "3044"
    secrets: inherit

  deploy_production:
    if: github.ref_name == 'main'
    name: Deploy (production)
    needs: buildx
    uses: ./.github/workflows/ssh_deploy.yaml
    with:
      # The buildx step tags images by branch name (type=ref,event=branch), so a
      # push to `main` pushes `<repo>:main` — NOT `:latest` (flavor `latest=auto`
      # only tags `latest` for semver git tags). Deploy the tag that actually
      # exists, mirroring deploy_develop/testnet which use their branch name.
      VERSION: ${{ inputs.VERSION || 'main' }}
      ENVIRONMENT: production
      CONTAINER_NAME: production-superhero-api-mainnet
      AE_NETWORK_ID: ae_mainnet
      API_HOST_PORT: "3033"
    secrets: inherit
